services:
  api:
    build: .
    image: fastapi-uv:latest
    container_name: fastapi-uv
    ports:
      - "8000:8000"
    env_file:
      - .env
    # 개발 중이면 소스 변경 감지를 위해 마운트 + --reload
    volumes:
      - ./:/app          # 로컬 코드를 컨테이너와 동기화
      - /app/.venv      # .venv 폴더는 동기화에서 제외 (핵심!)
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --reload

  db:
    image: postgres:15
    container_name: postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
volumes:
  pgdata:

